spring:
  application:
    name: "eurekaserver"

  config:
    import: "optional:configserver:http://localhost:8071/"


management:
  endpoints:
    web:
      exposure:
        include: "*"

  health:
    readiness:
      enabled: true

    liveness:
      enabled: true

  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    com:
      eazybytes:
        cards: DEBUG

  pattern:
    level: "%5p [${spring.application.name},%X{trace_id},%X{span_id}]"