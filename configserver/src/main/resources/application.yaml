spring:
  application:
    name: configserver

  profiles:
    active: git
#    active: native
#  rabbitmq:
#    host: "localhost"
#    port: 5672
#    username: "guest"
#    password: "guest"

  cloud:
    config:
      server:
        git:
          uri: "https://github.com/rahul253101/microservice_config.git"
          default-label: main
          force-pull: true
          copy-on-start: true
          timeout: 5
#        native:
#          search-location: "file:///D:/microserviceConfig/config"
#          search-location: "classpath:/config"

management:
  endpoints:
    web:
      exposure:
        include: "*"

  health:
    readiness-state:
      enabled: true
    liveness-state:
      enabled: true
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    com:
      eazybytes:
        cards: DEBUG

  pattern:
    level: "%5p [${spring.application.name},%X{trace_id},%X{span_id}]"

