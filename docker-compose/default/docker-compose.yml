  #    ports:
  #      - "3000:3000"
  #    healthcheck:
  #      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1" ]
  #      interval: 10s
  #      timeout: 5s
  #      retries: 5
  #    extends:
  #      file: common-config.yml
  #      service: network-deploy-service

  backend:
    image: grafana/loki:latest
    volumes:
      - ../observability/loki/loki-config.yaml:/etc/loki/config.yaml
    ports:
      - "3100"
      - "7946"
    command: "-config.file=/etc/loki/config.yaml -target=backend -legacy-read-mode=false"
    depends_on:
      - gateway
    healthcheck:
      test: [ "CMD", "/usr/bin/loki", "-health" ]
      start_period: 30s
      interval: 30s
      timeout: 10s
      retries: 5
    extends:
      file: common-config.yml
      service: network-deploy-service

  gateway:
    image: nginx:latest
    depends_on:
      - read
      - write
    entrypoint:
      - sh
      - -euc
      - |
        cat <<EOF > /etc/nginx/nginx.conf
        user  nginx;
        worker_processes  5;  ## Default: 1
        
        events {
          worker_connections   1000;
        }
        
        http {
          resolver 127.0.0.11;
        
          server {
            listen             3100;
        
            location = / {
              return 200 'OK';
              auth_basic off;
            }
        
            location = /api/prom/push {
              proxy_pass       http://write:3100\$$request_uri;
            }
        
            location = /api/prom/tail {
              proxy_pass       http://read:3100\$$request_uri;
              proxy_set_header Upgrade \$$http_upgrade;
              proxy_set_header Connection "upgrade";
            }
        
            location ~ /api/prom/.* {
              proxy_pass       http://read:3100\$$request_uri;
            }
        
            location = /loki/api/v1/push {
              proxy_pass       http://write:3100\$$request_uri;
            }
        
            location = /loki/api/v1/tail {
              proxy_pass       http://read:3100\$$request_uri;
              proxy_set_header Upgrade \$$http_upgrade;
              proxy_set_header Connection "upgrade";
            }
        
            location ~ /loki/api/.* {
              proxy_pass       http://read:3100\$$request_uri;
            }
          }
        }
        EOF
        /docker-entrypoint.sh nginx -g "daemon off;"
    ports:
      - "3100:3100"
    healthcheck:
      test: [ "CMD", "service", "nginx", "status" ]
      interval: 10s
      timeout: 5s
      retries: 5
    extends:
      file: common-config.yml
      service: network-deploy-service

  redis:

    image: redis:latest

    ports:
      - 6379:6379

    healthcheck:
      test: [ "CMD-SHELL", "redis-cli ping | grep PONG" ]
      timeout: 10s
      retries: 10

    container_name: redis-ms


    extends:
      file: common-config.yml
      service: network-deploy-service


  configserver:
    image: "rahul2501/configserver:v10"
    container_name: "configserver-ms"
    ports:
      - 8071:8071

    #    depends_on:
    #      rabbit:
    #        condition: service_healthy

    healthcheck:
      test: "curl --fail --silent localhost:8071/actuator/health/readiness | grep UP || exit 1"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

    extends:
      file: common-config.yml
      service: microservice-base-config

    environment:
      SPRING_APPLICATION_NAME: configserver
      OTEL_SERVICE_NAME: configserver


  eurekaserver:
    image: "rahul2501/eurekaserver:v10"
    container_name: "eurekaserver-ms"
    ports:
      - 8070:8070

    #    depends_on:
    #      rabbit:
    #        condition: service_healthy
    depends_on:
      configserver:
        condition: service_healthy

    healthcheck:
      test: "curl --fail --silent localhost:8070/actuator/health/readiness | grep UP || exit 1"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

    extends:
      file: common-config.yml
      service: microservice-eurekaserver-config

    environment:
      SPRING_APPLICATION_NAME: eurekaserver
      OTEL_SERVICE_NAME: eurekaserver




  accounts:
    image: "rahul2501/accounts:v10"
    container_name: "accounts-ms"
    ports:
      - 8080:8080

    healthcheck:
      test: "curl --fail --silent localhost:8080/actuator/health/readiness | grep UP || exit 1"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

    depends_on:
      eurekaserver:
        condition: service_healthy
      rabbit:
        condition: service_healthy

    environment:
      SPRING_APPLICATION_NAME: accounts
      OTEL_SERVICE_NAME: accounts
      SPRING_RABBITMQ_HOST: "rabbit"

    extends:
      file: common-config.yml
      service: microservice-configserver-config


  loans:
    image: "rahul2501/loans:v10"
    container_name: "loans-ms"
    ports:
      - 8090:8090

    healthcheck:
      test: "curl --fail --silent localhost:8090/actuator/health/readiness | grep UP || exit 1"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

    depends_on:
      eurekaserver:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: loans
      OTEL_SERVICE_NAME: loans

    extends:
      file: common-config.yml
      service: microservice-configserver-config

  cards:
    image: "rahul2501/cards:v10"
    container_name: "cards-ms"
    ports:
      - 9000:9000

    healthcheck:
      test: "curl --fail --silent localhost:9000/actuator/health/readiness | grep UP || exit 1"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

    depends_on:
      eurekaserver:
        condition: service_healthy

    environment:
      SPRING_APPLICATION_NAME: cards
      OTEL_SERVICE_NAME: cards

    extends:
      file: common-config.yml
      service: microservice-configserver-config


  edgeserver:
    image: "rahul2501/edgeserver:v10"
    container_name: "edgeserver-ms"
    ports:
      - 8072:8072

    #    depends_on:
    #      rabbit:
    #        condition: service_healthy
    depends_on:
      configserver:
        condition: service_healthy
      accounts:
        condition: service_healthy
      loans:
        condition: service_healthy
      cards:
        condition: service_healthy
      redis:
        condition: service_healthy

    extends:
      file: common-config.yml
      service: microservice-configserver-config

    environment:
      SPRING_APPLICATION_NAME: edgeserver
      OTEL_SERVICE_NAME: edgeserver
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_CONNECT-TIMEOUT: 2S
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_TIMEOUT: 1S

  message:
    image: "eazybytes/message:s10"
    container_name: message-ms
    depends_on:
      rabbit:
        condition: service_healthy
    environment:
      SPRING_RABBITMQ_HOST: "rabbit"
    extends:
      file: common-config.yml
      service: network-deploy-service


networks:
  eazy-bank:
    driver: "bridge"
